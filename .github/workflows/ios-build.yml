name: Build iOS .ipa (unsigned, for Sideloadly)

# Builds an UNSIGNED iOS .ipa on a hosted macOS runner so it can be signed
# later on Windows with Sideloadly + a free Apple ID (no Mac, no $99 program).
#
# The macos-26 runner ships .NET SDK 10.0.300 with a preinstalled
# Microsoft.iOS SDK pack (26.5.x) that requires EXACTLY Xcode 26.5 — the
# .NET-for-iOS toolchain pins a specific Xcode, not just a minimum. The
# runner's *default* Xcode is 26.4.1, so we must explicitly select 26.5
# (also installed on the image: 26.0.1 / 26.1.1 / 26.2 / 26.3 / 26.4.1 / 26.5).
#
# If a future servicing release changes the required Xcode, the build error
# states the exact version it wants. Check which Xcodes the runner has
# (actions/runner-images > images/macos/macos-26-arm64-Readme.md) and pin
# XCODE_VERSION to the one the installed iOS SDK pack demands.

on:
  workflow_dispatch:        # build on-demand from the Actions tab

jobs:
  build-ios:
    runs-on: macos-26
    env:
      PROJECT_PATH: src/BasketballScout.App/BasketballScout.App.csproj
      TFM: net10.0-ios
      CONFIG: Release
      XCODE_VERSION: "26.5"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
          xcodebuild -version

      - name: Show .NET and restore the iOS workload
        run: |
          dotnet --version                        # runner ships 10.0.300
          dotnet workload restore "$PROJECT_PATH"  # uses the preinstalled, SDK-matched workload

      - name: Publish (unsigned device build)
        run: |
          # Empty CodesignKey/Provision alone is NOT enough — the iOS device
          # build still demands a signing identity. _RequireCodeSigning=false
          # skips signing entirely, producing the unsigned .app that Sideloadly
          # will sign later with your free Apple ID.
          dotnet publish "$PROJECT_PATH" \
            -f "$TFM" \
            -c "$CONFIG" \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey= \
            -p:CodesignProvision= \
            -p:_RequireCodeSigning=false

      - name: Package .app into an .ipa (preserve framework symlinks)
        run: |
          APP_PATH=$(find "$(dirname "$PROJECT_PATH")/bin/$CONFIG/$TFM" -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found under the publish output"
            find . -type d -name "*.app"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          rm -rf payload-stage && mkdir -p payload-stage/Payload
          cp -R "$APP_PATH" payload-stage/Payload/
          # -y keeps the symlinks inside MAUI's embedded .framework/.dylib bundles,
          # which Sideloadly needs for a structurally valid IPA.
          (cd payload-stage && zip -qry ../BasketballScout.ipa Payload)
          ls -la BasketballScout.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: BasketballScout-ipa
          path: BasketballScout.ipa
          retention-days: 7
