name: Build iOS .ipa (unsigned, for Sideloadly)

# Builds an UNSIGNED iOS .ipa on a hosted macOS runner so it can be signed
# later on Windows with Sideloadly + a free Apple ID (no Mac, no $99 program).
#
# The macos-26 runner ships .NET SDK 10.0.300 with a preinstalled
# Microsoft.iOS SDK pack (26.5.x) that requires EXACTLY Xcode 26.5 — the
# .NET-for-iOS toolchain pins a specific Xcode, not just a minimum. The
# runner's *default* Xcode is 26.4.1, so we must explicitly select 26.5
# (also installed on the image: 26.0.1 / 26.1.1 / 26.2 / 26.3 / 26.4.1 / 26.5).
#
# If a future servicing release changes the required Xcode, the build error
# states the exact version it wants. Check which Xcodes the runner has
# (actions/runner-images > images/macos/macos-26-arm64-Readme.md) and pin
# XCODE_VERSION to the one the installed iOS SDK pack demands.

on:
  workflow_dispatch:        # build on-demand from the Actions tab

jobs:
  build-ios:
    runs-on: macos-26
    env:
      PROJECT_PATH: src/BasketballScout.App/BasketballScout.App.csproj
      TFM: net10.0-ios
      CONFIG: Release
      XCODE_VERSION: "26.5"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
          xcodebuild -version

      - name: Show .NET and restore the iOS workload
        run: |
          dotnet --version                        # runner ships 10.0.300
          dotnet workload restore "$PROJECT_PATH"  # uses the preinstalled, SDK-matched workload

      - name: Create a throwaway self-signed code-signing identity
        # A device (ios-arm64) build refuses to finish without a signing
        # identity in the keychain (and _RequireCodeSigning=false is ignored by
        # the .NET 10 iOS SDK). So we mint a self-signed "Apple Development"
        # cert just to satisfy the build. It is NOT a real Apple identity and
        # produces a non-installable bundle — that's fine: Sideloadly strips it
        # and re-signs with your free Apple ID at install time.
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          KEYCHAIN_PWD="ci-temp-pwd"
          CERT_NAME="Apple Development: CI Build"

          # OpenSSL config: code-signing EKU + an OU that looks like a team id.
          cat > "$RUNNER_TEMP/cs.cnf" <<'CNF'
          [req]
          distinguished_name = dn
          x509_extensions = v3
          prompt = no
          [dn]
          CN = Apple Development: CI Build
          OU = CIBUILD0000
          O  = BasketballScout CI
          C  = US
          [v3]
          basicConstraints = critical, CA:false
          keyUsage = critical, digitalSignature
          extendedKeyUsage = critical, codeSigning
          CNF

          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "$RUNNER_TEMP/cs.key" -out "$RUNNER_TEMP/cs.crt" \
            -days 365 -config "$RUNNER_TEMP/cs.cnf"
          # -legacy + SHA1 MAC/3DES so macOS 'security import' can read the .p12.
          # (OpenSSL 3.x defaults to AES-256, which fails MAC verification on import.)
          openssl pkcs12 -export -legacy -macalg sha1 \
            -inkey "$RUNNER_TEMP/cs.key" -in "$RUNNER_TEMP/cs.crt" \
            -out "$RUNNER_TEMP/cs.p12" -passout "pass:$KEYCHAIN_PWD" -name "$CERT_NAME"

          # Create + unlock a dedicated keychain and import the identity.
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cs.p12" -k "$KEYCHAIN_PATH" -P "$KEYCHAIN_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null

          # Put our keychain first in the search list and trust the cert so it
          # registers as a *valid* code-signing identity.
          EXISTING=$(security list-keychains -d user | sed 's/[\" ]//g')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING
          security default-keychain -s "$KEYCHAIN_PATH"
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cs.crt" || true

          echo "Valid code-signing identities:"
          security find-identity -v -p codesigning

          # Hand the cert name + keychain to later steps.
          echo "CODESIGN_KEY=$CERT_NAME" >> "$GITHUB_ENV"

      - name: Publish (device build, self-signed for Sideloadly to re-sign)
        run: |
          dotnet publish "$PROJECT_PATH" \
            -f "$TFM" \
            -c "$CONFIG" \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="$CODESIGN_KEY" \
            -p:CodesignProvision= \
            -p:CodesignEntitlements= \
            -p:ArchiveOnBuild=false

      - name: Package .app into an .ipa (preserve framework symlinks)
        run: |
          APP_PATH=$(find "$(dirname "$PROJECT_PATH")/bin/$CONFIG/$TFM" -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found under the publish output"
            find . -type d -name "*.app"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          rm -rf payload-stage && mkdir -p payload-stage/Payload
          cp -R "$APP_PATH" payload-stage/Payload/
          # -y keeps the symlinks inside MAUI's embedded .framework/.dylib bundles,
          # which Sideloadly needs for a structurally valid IPA.
          (cd payload-stage && zip -qry ../BasketballScout.ipa Payload)
          ls -la BasketballScout.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: BasketballScout-ipa
          path: BasketballScout.ipa
          retention-days: 7
