name: Build & upload iOS to TestFlight

# Builds a SIGNED iOS .ipa on a hosted macOS runner and uploads it to
# TestFlight, using an Apple Developer Program account ($99/yr). No Mac
# needed on your desk — you install the build on your iPad via the
# TestFlight app over the air.
#
# Required GitHub secrets (Settings > Secrets and variables > Actions > Secrets):
#   IOS_DIST_CERT_P12_BASE64   - base64 of your Apple Distribution .p12
#   IOS_DIST_CERT_PASSWORD     - password you set on that .p12
#   IOS_PROVISION_PROFILE_BASE64 - base64 of your App Store .mobileprovision
#   IOS_SIGNING_IDENTITY       - e.g. "Apple Distribution: Your Name (TEAMID)"
#   APPSTORE_ISSUER_ID         - App Store Connect API issuer id (UUID)
#   APPSTORE_KEY_ID            - App Store Connect API key id
#   APPSTORE_API_PRIVATE_KEY   - full text of the AuthKey_XXXX.p8 file
# Required GitHub variable (same screen > Variables):
#   IOS_PROVISION_PROFILE_NAME - the exact name you gave the profile in Apple's portal

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-26
    env:
      PROJECT_PATH: src/BasketballScout.App/BasketballScout.App.csproj
      TFM: net10.0-ios
      CONFIG: Release
      XCODE_VERSION: "26.5"   # must match the runner's installed iOS SDK pack

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
          xcodebuild -version

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode \
            > "$PROFILE_DIR/build.mobileprovision"
          echo "Installed provisioning profile:"
          security cms -D -i "$PROFILE_DIR/build.mobileprovision" | \
            plutil -extract Name raw - || true

      - name: Restore the iOS workload
        run: dotnet workload restore "$PROJECT_PATH"

      - name: Detect the imported signing identity
        run: |
          echo "Code-signing identities in the keychain:"
          security find-identity -v -p codesigning
          # Grab the first valid identity's name (the bit in quotes).
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep -o '"[^"]*"' | head -n1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No code-signing identity found in the keychain"
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "CODESIGN_KEY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Publish signed .ipa
        run: |
          # github.run_number gives every upload a unique, increasing build
          # number so TestFlight never rejects a duplicate.
          # CodesignKey is auto-detected above to avoid name-mismatch errors.
          dotnet publish "$PROJECT_PATH" \
            -f "$TFM" \
            -c "$CONFIG" \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:CodesignKey="$CODESIGN_KEY" \
            -p:CodesignProvision="${{ vars.IOS_PROVISION_PROFILE_NAME }}"

      - name: Locate the .ipa
        id: ipa
        run: |
          IPA=$(find "$(dirname "$PROJECT_PATH")/bin/$CONFIG/$TFM" -name "*.ipa" | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa was produced"
            find . -name "*.ipa"
            exit 1
          fi
          echo "Found: $IPA"
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        # Upload directly with altool instead of the polling action: it uploads
        # and exits, so there's no post-upload "wait for processing" loop whose
        # 20-minute App Store Connect token can expire and 401 on slow processing.
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          # altool looks for the key here: ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          xcrun altool --upload-app \
            -f "${{ steps.ipa.outputs.path }}" \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

      - name: Upload .ipa artifact (backup copy)
        uses: actions/upload-artifact@v4
        with:
          name: BasketballScout-ipa
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 7
